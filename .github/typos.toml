# crate-ci/typos の設定。
# 生成物・サードパーティ・バイナリ系を除外する。
[files]
extend-exclude = [
  "package-lock.json",
  "build/",
  "dist/",
  ".svelte-kit/",
  "target/",
  "src-tauri/target/",
  "src-tauri/gen/",
  "src-tauri/binaries/",
  "*.lock",
  "*.lockb",
  "*.min.js",
  "*.min.css",
]

[default]
# 日本語混在ファイルでの誤検出を抑える。
locale = "en-us"

[default.extend-words]
# プロジェクト固有語を whitelist する。
NNDD = "NNDD"
nndd = "nndd"
niconico = "niconico"
yajuvideo = "yajuvideo"
