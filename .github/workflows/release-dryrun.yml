name: Release dry-run (Tauri bundle)

# 毎 push / PR でリリースバンドルが組み上がるかを CI で検証する。
# - release.yml と同じ matrix で実 build (`tauri build`) まで走らせる
# - GitHub Release への upload はしない (tauri-action を使わない)
# - 成果物は actions artifact として短期保管し、必要なら手元で取れる
#
# 目的: タグ push 当日に CI で初めて release build がコケる、を避ける。
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-dryrun-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
  NODE_VERSION: '20'

jobs:
  bundle-dryrun:
    name: Tauri bundle dry-run (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # macos-13 (Intel) ランナーは枯渇していて queued のまま数十時間動かないため、
          # Apple Silicon ホスト (macos-14) 上で x86_64-apple-darwin をクロスビルドする。
          # dry-run は署名・公証・DMG マウントを伴わないのでクロスビルドで問題ない。
          - name: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 90
    env:
      # release.yml と同じく rustc spawn を回避するため matrix から渡す。
      TARGET_TRIPLE: ${{ matrix.platform.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust (stable, ${{ matrix.platform.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-dryrun-${{ matrix.platform.target }}
          cache-on-failure: true

      - name: Install Linux deps (Tauri 2)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            patchelf

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Fetch sidecar binaries (yt-dlp / ffmpeg)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/fetch-binaries.sh

      - name: Fetch sidecar binaries (Windows / Git Bash)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/fetch-binaries.sh

      # tauri-action を使わず CLI 直叩き = GitHub Release への upload を伴わない。
      # release.yml と同じく `--target` を渡してビルドする。
      - name: Tauri build (no release upload)
        run: npm run tauri build -- --target ${{ matrix.platform.target }}

      - name: Upload bundle artifact (dry-run)
        uses: actions/upload-artifact@v7
        with:
          name: tauri-dryrun-${{ matrix.platform.name }}-${{ github.sha }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**
          if-no-files-found: warn
          retention-days: 7

  # マージゲート用の集約ジョブ。ブランチ保護では "release-dryrun-success"
  # 1 件だけを required にすればよい。
  release-dryrun-success:
    name: Release dry-run success
    if: ${{ always() }}
    needs:
      - bundle-dryrun
    runs-on: ubuntu-latest
    steps:
      - name: Verify all matrix jobs succeeded
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON"
          echo "$NEEDS_JSON" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          failed = [name for name, info in data.items() if info.get("result") != "success"]
          if failed:
              print(f"Failed/skipped jobs: {failed}")
              sys.exit(1)
          print("All release dry-run jobs succeeded.")
          '
