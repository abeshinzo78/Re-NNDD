# cargo-deny の設定。CI (`.github/workflows/security.yml`) から呼ばれる。
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
# Tauri / 周辺クレートで一般的な OSS ライセンスを許可。
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "MPL-2.0",
  "OpenSSL",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[[licenses.exceptions]]
# ring は OpenSSL 系のミックスライセンス。Tauri/reqwest 経由で必須。
name = "ring"
allow = ["ISC", "MIT", "OpenSSL"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# ワークスペース内 path dep の wildcard は許可。
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
